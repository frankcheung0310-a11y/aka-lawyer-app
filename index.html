<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKA Lawyer | AI Legal Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #004D8B; }
        .chat-container { background-color: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        .text-navy { color: #004D8B; }
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #004D8B; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-white antialiased font-sans">
    <div class="max-w-3xl mx-auto py-12 px-6">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-2">AKA LAWYER</h1>
            <p class="text-blue-200 text-xs font-medium tracking-[0.4em] uppercase">Est. 2002 | AI Legal Intelligence</p>
        </header>

        <div class="chat-container rounded-3xl border border-white/20 p-6 shadow-2xl">
            <div id="chat-box" class="bg-white rounded-2xl h-[450px] overflow-y-auto p-6 mb-6 flex flex-col gap-4 shadow-inner text-navy text-sm">
                <div class="bg-blue-50 p-4 rounded-xl self-start border border-blue-100">
                    Welcome. I am <strong>AKA Lawyer</strong>. I am now powered by Grok-4-1-Fast. How can I help?
                </div>
            </div>

            <div class="relative">
                <input id="user-input" type="text" placeholder="Describe your legal inquiry..." 
                    class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-5 pr-36 text-white placeholder-blue-200 focus:outline-none focus:ring-2 focus:ring-white">
                <button onclick="askAI()" class="absolute right-2 top-2 bottom-2 bg-white text-[#004D8B] font-bold px-8 rounded-xl hover:bg-blue-50 active:scale-95 transition-all uppercase tracking-tighter">
                    Consult
                </button>
            </div>
        </div>

        <footer class="mt-8 text-center opacity-40 text-[10px] tracking-widest">
            &copy; 2026 AKA LAWYER PROJECT | LEGACY SINCE 2002 | POWERED BY GROK-4-1-FAST
        </footer>
    </div>

    <script>
        // 【重要】如果你正在测试且还没配置 GitHub Action，请临时把下面这行改成你的真实 API Key
        // 比如: var SECRET_KEY = 'xai-C3vzGwnuy...';
        var SECRET_KEY = 'AKA_LAWYER_SECRET_PLACEHOLDER';

        function askAI() {
            var input = document.getElementById('user-input');
            var box = document.getElementById('chat-box');
            var text = input.value;

            if (!text || text.trim() === '') return;
            input.value = '';

            // 用户气泡
            var uDiv = document.createElement('div');
            uDiv.className = 'bg-blue-600 text-white p-4 rounded-2xl self-end max-w-[85%] animate-fade-in';
            uDiv.innerText = text;
            box.appendChild(uDiv);
            box.scrollTop = box.scrollHeight;

            // 构造完全对齐你提供的 curl 的请求
            var payload = {
                "model": "grok-4-1-fast",
                "messages": [
                    { "role": "system", "content": "You are AKA Lawyer, a professional AI legal consultant. Established in 2002." },
                    { "role": "user", "content": text }
                ],
                "stream": false,
                "temperature": 0
            };

            fetch('https://api.x.ai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + SECRET_KEY
                },
                body: JSON.stringify(payload)
            })
            .then(function(res) {
                // 如果返回的不是 200 OK，抛出具体的错误码
                if (!res.ok) { 
                    return res.json().then(function(errData) {
                        throw new Error('HTTP ' + res.status + ': ' + (errData.error ? errData.error.message : 'Unknown API Error'));
                    });
                }
                return res.json();
            })
            .then(function(data) {
                var reply = data.choices[0].message.content;
                var aDiv = document.createElement('div');
                aDiv.className = 'bg-slate-50 p-4 rounded-2xl self-start max-w-[90%] border border-blue-100 text-navy animate-fade-in';
                aDiv.innerHTML = reply.split('\n').join('<br>') + 
                    '<div style="font-size:9px; color:#94a3b8; margin-top:10px; border-top:1px dotted #cbd5e1; pt-2">Grok-4-Fast Intelligence | Legacy 2002</div>';
                box.appendChild(aDiv);
                box.scrollTop = box.scrollHeight;
            })
            .catch(function(err) {
                var eDiv = document.createElement('div');
                eDiv.className = 'text-red-400 text-[11px] text-center font-bold py-4 uppercase tracking-widest';
                // 这里会显示具体的错误原因
                eDiv.innerText = 'Consultation Error: ' + err.message;
                box.appendChild(eDiv);
                console.error('Full Error Detail:', err);
            });
        }

        document.getElementById('user-input').onkeypress = function(e) {
            if (e.keyCode === 13) askAI();
        };
    </script>
</body>
</html>
